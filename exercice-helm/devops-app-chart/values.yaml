replicaCount: 3

image:
  repository: devops-app
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: ""
  annotations: {}
  hosts:
    - host: devops.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

httpRoute:
  enabled: false

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

config:
  nodeEnv: production
  logLevel: info 
  appPort: "3000"

postgresql:
  enabled: true
  auth:
    database: appdb
    username: appuser
    
  primary:
    persistence:
      size: 1Gi

probes:
  readiness:
    path: /
    initialDelaySeconds: 5
    periodSeconds: 10
  liveness:
    path: /
    initialDelaySeconds: 15
    periodSeconds: 20

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70